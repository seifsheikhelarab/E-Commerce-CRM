$kind: http-request
name: Delete Organization
method: POST
url: '{{baseUrl}}/api/auth/organization/delete'
order: 5000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{sessionToken}}'
body:
  type: json
  content: |-
    {
      "organizationId": "{{organizationId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is valid JSON", function () {
          pm.response.to.be.json;
      });

      // Clear organization ID after deletion
      pm.collectionVariables.unset("organizationId");
      console.log("Organization ID cleared after deletion");
