$kind: collection
name: E-Commerce CRM API
description: >-
  Complete API collection for the E-Commerce CRM application.


  ## Authentication

  This API uses Better Auth for authentication. After signing in, extract the
  session token from the response and use it in the Authorization header as a
  Bearer token.


  ## Organization

  Users can create and manage organizations. Each organization can have multiple
  members with different roles (owner, admin, member).


  ## Getting Started

  1. Sign up with email/password

  2. Sign in to get a session token

  3. Create an organization

  4. Invite members to your organization
variables:
