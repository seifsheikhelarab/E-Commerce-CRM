$kind: http-request
name: Create Customer Event
url: '{{baseUrl}}/api/customers/{{customerId}}/events'
method: POST
order: 2600
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "eventType": "ORDER_PLACED",
          "description": "Customer placed an order for $99.99",
          "source": "shopify",
          "metadata": {
            "orderId": "123456",
            "amount": "99.99"
          }
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 201", function () {
              pm.response.to.have.status(201);
          });

          pm.test("Store eventId", function () {
              var jsonData = pm.response.json();
              if (jsonData.data && jsonData.data.id) {
                  pm.environment.set("eventId", jsonData.data.id);
              }
          });
