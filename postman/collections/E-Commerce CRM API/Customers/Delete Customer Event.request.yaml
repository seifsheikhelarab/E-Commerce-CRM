$kind: http-request
name: Delete Customer Event
url: '{{baseUrl}}/api/customers/{{customerId}}/events/{{eventId}}'
method: DELETE
order: 2800
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });
