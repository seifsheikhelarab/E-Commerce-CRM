$kind: http-request
name: Update Customer Note
url: '{{baseUrl}}/api/customers/{{customerId}}/notes/{{noteId}}'
method: PUT
order: 2300
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "body": "Updated note content about customer preferences."
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("Response is JSON", function () {
              pm.response.to.be.json;
          });
