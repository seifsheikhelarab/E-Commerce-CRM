$kind: http-request
name: Update Customer Event
url: '{{baseUrl}}/api/customers/{{customerId}}/events/{{eventId}}'
method: PUT
order: 2700
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "description": "Updated event description",
          "metadata": {
            "updated": true,
            "reason": "correction"
          }
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("Response is JSON", function () {
              pm.response.to.be.json;
          });
