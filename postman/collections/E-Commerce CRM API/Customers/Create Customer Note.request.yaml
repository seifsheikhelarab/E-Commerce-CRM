$kind: http-request
name: Create Customer Note
url: '{{baseUrl}}/api/customers/{{customerId}}/notes'
method: POST
order: 2200
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "body": "This is a customer note about their preferences."
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 201", function () {
              pm.response.to.have.status(201);
          });

          pm.test("Store noteId", function () {
              var jsonData = pm.response.json();
              if (jsonData.data && jsonData.data.id) {
                  pm.environment.set("noteId", jsonData.data.id);
              }
          });
