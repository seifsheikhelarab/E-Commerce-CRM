$kind: http-request
name: Receive Webhook (Test)
url: '{{baseUrl}}/api/webhooks/shopify/{{integrationId}}'
method: POST
order: 1950
headers:
    - key: X-Shopify-Hmac-Sha256
      value: 'generated-hmac-signature'
    - key: X-Shopify-Topic
      value: orders/create
    - key: X-Shopify-Shop-Domain
      value: 'mystore.myshopify.com'
    - key: X-Shopify-Webhook-Id
      value: '123456789'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "id": 1234567890,
          "email": "customer@example.com",
          "created_at": "2024-01-15T10:30:00Z",
          "updated_at": "2024-01-15T10:30:00Z",
          "total_price": "99.99",
          "currency": "USD",
          "financial_status": "paid",
          "fulfillment_status": null,
          "customer": {
            "id": 9876543210,
            "email": "customer@example.com",
            "first_name": "John",
            "last_name": "Doe",
            "phone": "+1234567890",
            "accepts_marketing": true,
            "addresses": [
              {
                "address1": "123 Main St",
                "city": "New York",
                "province": "NY",
                "zip": "10001",
                "country": "USA"
              }
            ]
          },
          "line_items": [
            {
              "id": 111111,
              "product_id": 222222,
              "variant_id": 333333,
              "title": "Sample Product",
              "quantity": 2,
              "price": "49.99",
              "sku": "SKU001"
            }
          ],
          "subtotal_price": "99.99",
          "total_tax": "8.00",
          "total_discounts": "0.00",
          "tags": "web,new-customer",
          "source": "web"
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("Webhook acknowledged", function () {
              var jsonData = pm.response.json();
              pm.expect(jsonData.received).to.be.true;
          });
