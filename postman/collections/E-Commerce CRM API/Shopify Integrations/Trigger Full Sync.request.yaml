$kind: http-request
name: Trigger Full Sync
url: '{{baseUrl}}/api/integrations/{{integrationId}}/sync/full'
method: POST
order: 1700
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "entities": ["customers", "orders", "products"]
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("Response is JSON", function () {
              pm.response.to.be.json;
          });

          pm.test("Sync completed", function () {
              var jsonData = pm.response.json();
              pm.expect(jsonData.data).to.have.property('itemsProcessed');
          });
