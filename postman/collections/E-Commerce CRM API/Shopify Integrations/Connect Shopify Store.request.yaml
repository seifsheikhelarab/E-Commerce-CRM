$kind: http-request
name: Connect Shopify Store
url: '{{baseUrl}}/api/integrations/shopify/connect'
method: POST
order: 1000
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "shopDomain": "mystore.myshopify.com",
          "accessToken": "your-shopify-admin-api-token",
          "name": "My Shopify Store",
          "apiSecret": "your-webhook-secret-optional"
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 201", function () {
              pm.response.to.have.status(201);
          });

          pm.test("Response is JSON", function () {
              pm.response.to.be.json;
          });

          pm.test("Store integrationId", function () {
              var jsonData = pm.response.json();
              if (jsonData.data && jsonData.data.id) {
                  pm.environment.set("integrationId", jsonData.data.id);
              }
          });
