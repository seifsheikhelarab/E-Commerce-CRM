$kind: http-request
name: Register Webhooks
url: '{{baseUrl}}/api/integrations/{{integrationId}}/webhooks/register'
method: POST
order: 1600
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "topics": [
            "orders/create",
            "orders/updated",
            "orders/paid",
            "customers/create",
            "customers/update",
            "customers/disable",
            "products/create",
            "products/update",
            "products/delete"
          ]
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("Response is JSON", function () {
              pm.response.to.be.json;
          });

          pm.test("Webhooks registered", function () {
              var jsonData = pm.response.json();
              pm.expect(jsonData.data.registered).to.have.length.above(0);
          });
